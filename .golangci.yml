# golangci-lint configuration (v2 schema).
#
# The default v2 linter set already includes errcheck, govet, ineffassign,
# staticcheck, and unused; we add revive and depguard on top.
#
# Architecture enforcement (see docs/PLAN.md "Enforced rules"):
#   - Domain purity: a module's domain package may import only the standard
#     library, uuid, and the platform error taxonomy — never the service or
#     adapter layers, the platform kernel, or other modules. (depguard, below)
#   - Platform isolation: the platform kernel must not depend on business
#     modules or the composition layer. (depguard, below)
#   - Modules reach other modules only through their public `ports` package:
#     each module's domain/service/adapters live under its internal/ directory,
#     so the Go compiler forbids cross-module imports of them. (compiler)

version: "2"

linters:
  enable:
    - revive
    - depguard
  settings:
    depguard:
      rules:
        # A module's domain layer is pure.
        domain:
          list-mode: strict
          files:
            - "**/internal/domain/**"
          allow:
            - $gostd
            - github.com/google/uuid
            - github.com/williamokano/entitlements/internal/platform/apperr
        # The platform kernel is the shared foundation and depends on neither
        # business modules nor the composition layer.
        platform:
          list-mode: lax
          files:
            - "**/internal/platform/**"
          deny:
            - pkg: github.com/williamokano/entitlements/internal/modules
              desc: platform is the shared kernel and must not depend on business modules
            - pkg: github.com/williamokano/entitlements/internal/app
              desc: platform must not depend on the composition layer
  exclusions:
    rules:
      # doc.go stubs carry package documentation only.
      - path: doc\.go
        linters:
          - revive
