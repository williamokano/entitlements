services:
  postgres:
    image: postgres:16-alpine
    container_name: entitlements-postgres
    environment:
      POSTGRES_USER: entitlements
      POSTGRES_PASSWORD: entitlements
      POSTGRES_DB: entitlements
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entitlements -d entitlements"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
