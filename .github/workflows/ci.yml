name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    outputs:
      admin: ${{ steps.filter.outputs.admin }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            admin:
              - 'admin/**'
              - '.github/workflows/ci.yml'
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
              - 'migrations/**'
              - 'sqlc.yaml'
              - '.github/workflows/ci.yml'

  admin:
    name: admin · lint · build · test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    defaults:
      run:
        working-directory: admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (demo enabled)
        run: npm run build

      - name: Build (demo disabled — bundle must drop the demo)
        run: VITE_ENABLE_DEMO=false npm run build

      - name: Test
        run: npm test

  admin-image:
    name: admin · docker image
    runs-on: ubuntu-latest
    needs: changes
    # Build the image on any PR that touches admin/, and always on main (where
    # we additionally push the tagged image to GHCR).
    if: needs.changes.outputs.admin == 'true' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Only needed for the push on main; PRs (incl. from forks) just build.
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/admin
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: admin
          file: admin/Dockerfile
          # Push tagged (sha + latest) images only on main; PRs build for
          # verification without pushing.
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: ${{ github.ref != 'refs/heads/main' }}

      - name: Smoke test the image
        # Boot the built image with a distinctive API URL and assert the
        # runtime config is injected and the SPA serves with history fallback.
        if: github.ref != 'refs/heads/main'
        run: |
          set -euo pipefail
          IMAGE="$(echo '${{ steps.meta.outputs.tags }}' | head -n1)"
          docker run -d --name admin-smoke -p 3000:80 \
            -e API_BASE_URL=http://smoke-test.example "$IMAGE"
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:3000/; then break; fi
            sleep 1
          done
          echo "--- /app-config.js ---"
          curl -s http://localhost:3000/app-config.js
          curl -s http://localhost:3000/app-config.js | grep -q 'http://smoke-test.example'
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/)" = 200
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/some/deep/route)" = 200
          docker rm -f admin-smoke

  api-image:
    name: api · docker image
    runs-on: ubuntu-latest
    needs: changes
    # Build the image on any PR that touches Go/Docker/migrations, and always on
    # main (where we additionally push the tagged image to GHCR).
    if: needs.changes.outputs.go == 'true' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          # Push tagged (sha + latest) images only on main; PRs build for
          # verification without pushing.
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: ${{ github.ref != 'refs/heads/main' }}

      - name: Smoke test the image
        # The scratch image has no shell; check the binary starts and rejects a
        # bad config fast (it exits non-zero without a reachable database, which
        # proves the entrypoint runs). Disable errexit: the expected result is a
        # non-zero `docker run`, which would otherwise abort the step.
        if: github.ref != 'refs/heads/main'
        run: |
          set +e
          IMAGE="$(echo '${{ steps.meta.outputs.tags }}' | head -n1)"
          # No DB reachable → the API must fail to boot (non-zero), not hang.
          timeout 20 docker run --rm -e APP_ENV=development \
            -e DATABASE_URL='postgres://x:x@127.0.0.1:1/x?sslmode=disable' "$IMAGE"
          code=$?
          # 0 would mean it booted without a DB (wrong); 124 = timeout (hung).
          if [ "$code" = "0" ] || [ "$code" = "124" ]; then
            echo "unexpected exit code $code (0=booted without DB, 124=hung)"; exit 1
          fi
          echo "api image starts and exits non-zero without a database (code $code) — OK"

  build:
    name: lint · test · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.5.0

      - name: Install sqlc
        # Use the prebuilt release binary rather than `go install`, which
        # compiles sqlc from source and is slow/flaky on a cold module cache.
        run: |
          curl -sSfL https://github.com/sqlc-dev/sqlc/releases/download/v1.28.0/sqlc_1.28.0_linux_amd64.tar.gz \
            | tar -xz -C "$(go env GOPATH)/bin" sqlc

      - name: Verify generated code is current
        run: |
          make generate
          git diff --exit-code

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Lint
        run: make lint

      - name: Architecture check (illegal import must fail lint)
        run: make archcheck

      - name: Test
        run: make test

      - name: Integration tests (testcontainers)
        run: make test-integration

      - name: Build
        run: make build
