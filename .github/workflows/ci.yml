name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    outputs:
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            admin:
              - 'admin/**'
              - '.github/workflows/ci.yml'

  admin:
    name: admin · lint · build · test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    defaults:
      run:
        working-directory: admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (demo enabled)
        run: npm run build

      - name: Build (demo disabled — bundle must drop the demo)
        run: VITE_ENABLE_DEMO=false npm run build

      - name: Test
        run: npm test

  build:
    name: lint · test · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.5.0

      - name: Install sqlc
        # Use the prebuilt release binary rather than `go install`, which
        # compiles sqlc from source and is slow/flaky on a cold module cache.
        run: |
          curl -sSfL https://github.com/sqlc-dev/sqlc/releases/download/v1.28.0/sqlc_1.28.0_linux_amd64.tar.gz \
            | tar -xz -C "$(go env GOPATH)/bin" sqlc

      - name: Verify generated code is current
        run: |
          make generate
          git diff --exit-code

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Lint
        run: make lint

      - name: Architecture check (illegal import must fail lint)
        run: make archcheck

      - name: Test
        run: make test

      - name: Integration tests (testcontainers)
        run: make test-integration

      - name: Build
        run: make build
