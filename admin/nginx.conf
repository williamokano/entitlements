server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # --- compression --------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain
                      text/css
                      text/javascript
                      application/javascript
                      application/json
                      application/xml
                      image/svg+xml
                      font/woff2;

    # --- never cache the shell or the runtime config ------------------------
    # These must reflect the current deploy immediately (new bundle hashes,
    # new env-injected config), so they are always revalidated.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /app-config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # --- fingerprinted build assets are immutable ---------------------------
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # --- SPA history fallback ----------------------------------------------
    # Any unknown path serves index.html so client-side routing (deep links,
    # page refreshes) works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
